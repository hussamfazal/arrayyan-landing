<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:#1A1A2E;
    font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    -webkit-font-smoothing:antialiased;
    color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:-webkit-fill-available;
  }
  .main{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:100%;max-width:380px;padding:40px 20px;gap:32px;
  }
  .logo-img{
    width:100px;height:100px;border-radius:24px;
    box-shadow:0 0 30px rgba(0,168,107,.15);
  }
  h1{
    font-family:Georgia,'Times New Roman',serif;
    font-size:44px;font-weight:400;color:#D4AF37;text-align:center;
  }
  .buttons{display:flex;flex-direction:column;gap:12px;width:100%}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:12px;
    padding:14px 20px;border-radius:14px;
    background:#16213E;border:1px solid rgba(255,255,255,.08);
    color:#fff;font-size:15px;font-weight:500;
    text-decoration:none;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:background .15s,border-color .15s;
  }
  .btn:active{background:rgba(0,168,107,.12);border-color:rgba(0,168,107,.25)}
  .btn svg{width:22px;height:22px;flex-shrink:0}
  .btn-text{display:flex;flex-direction:column;align-items:flex-start;line-height:1.2}
  .btn-text span:first-child{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase}
  .btn-text span:last-child{font-size:16px;font-weight:600}
  .footer{padding:20px;font-size:11px;color:rgba(255,255,255,.12)}

<script>
(function(){
  var ua=navigator.userAgent||'';
  var isIOS=/iPhone|iPad|iPod/i.test(ua);
  var isAndroid=/Android/i.test(ua);

  document.getElementById('iosBtn').href='https://apps.apple.com/app/'+CONFIG.iosAppName+'/id'+CONFIG.iosAppId;
  document.getElementById('androidBtn').href='https://play.google.com/store/apps/details?id='+CONFIG.androidPackage;

  if(isIOS) document.getElementById('iosBtn').style.borderColor='rgba(0,168,107,.4)';
  if(isAndroid) document.getElementById('androidBtn').style.borderColor='rgba(0,168,107,.4)';

  document.getElementById('whatsappBtn').href='https://wa.me/?text='+encodeURIComponent('Ar-Rayyan \uD83D\uDD4C\n\n'+CONFIG.baseUrl);

  window.shareLink=function(){
    if(navigator.share){
      navigator.share({title:'Ar-Rayyan',url:CONFIG.baseUrl}).catch(function(){});
      return;
    }
    if(navigator.clipboard){
      navigator.clipboard.writeText(CONFIG.baseUrl).catch(function(){});
    }
  };
})();
</script>
