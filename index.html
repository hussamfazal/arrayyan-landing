<!-- ─── CONFIGURATION ──────────────────────────────────────────── -->
<!--
  UPDATE THESE before deploying:
  - IOS_APP_ID: your App Store app ID (digits from the App Store URL)
  - ANDROID_PACKAGE: already set to your actual package name
  - BASE_URL: the URL where this page is hosted (for share links)
  - OG_IMAGE_URL: full URL to your Open Graph preview image
-->
<script>
  const CONFIG = {
    iosAppId:      "6743618943",                                       /* ← UPDATE: your App Store ID */
    iosAppName:    "ar-rayyan",
    androidPackage: "com.hussam.arrayyan",
    baseUrl:        "https://arrayyan.app",                            /* ← UPDATE: where you host this */
    ogImageUrl:     "https://arrayyan.app/og-image.png",               /* ← UPDATE: your OG image URL */
    redirectDelayMs: 600,    /* Delay before auto-redirect (0 = instant) */
  };
</script>

<style>
  :root {
    --bg: #0a1a0f;
    --gold: #c9a84c;
    --gold-glow: rgba(201, 168, 76, 0.18);
    --teal: #2ecc71;
    --text: #ffffff;
    --text-muted: rgba(255, 255, 255, 0.55);
    --card-bg: rgba(255, 255, 255, 0.04);
    --card-border: rgba(255, 255, 255, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Background ─────────────────────────────────────────────── */
  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 25%, rgba(201, 168, 76, 0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 25% 80%, rgba(46, 204, 113, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 75% 80%, rgba(46, 204, 113, 0.04) 0%, transparent 60%),
      var(--bg);
    z-index: 0;
  }

  /* ── Main card ──────────────────────────────────────────────── */
  .main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 48px 24px 40px;
    max-width: 480px;
    width: 100%;
    gap: 36px;
  }

  /* ── Star icon ──────────────────────────────────────────────── */
  .star-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .star-glow {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201, 168, 76, 0.15) 0%, transparent 60%);
  }

  .star-svg {
    width: 100px;
    height: 100px;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 0 30px rgba(201, 168, 76, 0.3));
  }

  /* ── Headline ───────────────────────────────────────────────── */
  .headline {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 56px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 1px;
    line-height: 1;
    text-align: center;
  }

  .tagline {
    font-size: 18px;
    font-weight: 300;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
    letter-spacing: 0.3px;
  }

  /* ── Feature pills ──────────────────────────────────────────── */
  .features {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .pill {
    padding: 10px 22px;
    border-radius: 100px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.2px;
    white-space: nowrap;
  }

  .pill.accent {
    border-color: rgba(201, 168, 76, 0.25);
    color: var(--gold);
  }

  /* ── Redirect badge ─────────────────────────────────────────── */
  .redirect-badge {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 100px;
    background: rgba(46, 204, 113, 0.1);
    border: 1px solid rgba(46, 204, 113, 0.2);
    font-size: 14px;
    color: var(--teal);
    animation: pulse 2s infinite;
  }

  .redirect-badge.visible { display: flex; }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(46, 204, 113, 0.2);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.5; }
  }

  /* ── Download buttons ───────────────────────────────────────── */
  .download-section {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 360px;
  }

  .download-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 18px 24px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    color: var(--text);
    font-size: 16px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .download-btn:hover,
  .download-btn:active {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.14);
  }

  .download-btn.primary {
    background: rgba(201, 168, 76, 0.1);
    border-color: rgba(201, 168, 76, 0.25);
  }

  .download-btn.primary:hover,
  .download-btn.primary:active {
    background: rgba(201, 168, 76, 0.18);
    border-color: rgba(201, 168, 76, 0.4);
  }

  .download-btn svg {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .btn-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.2;
  }

  .btn-text .label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .btn-text .store {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  /* ── Divider ────────────────────────────────────────────────── */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 360px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }
  .divider span {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Share ──────────────────────────────────────────────────── */
  .share-section {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 360px;
  }

  .share-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px;
    border-radius: 14px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .share-btn:hover,
  .share-btn:active {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
  }

  .share-btn svg {
    width: 18px;
    height: 18px;
  }

  /* ── Toast ──────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 14px 28px;
    border-radius: 100px;
    background: rgba(46, 204, 113, 0.15);
    border: 1px solid rgba(46, 204, 113, 0.3);
    color: var(--teal);
    font-size: 14px;
    font-weight: 500;
    z-index: 100;
    transition: transform 0.3s ease;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ── Footer ─────────────────────────────────────────────────── */
  .footer {
    position: relative;
    padding: 24px;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
  }

  .footer a { color: rgba(255,255,255,0.3); }
</style>
</head>
<body>

    <a class="download-btn" id="androidBtn"

      <svg viewBox="0 0 24 24" fill="white">

  <!-- Divider -->

  <!-- Share buttons -->
  <div class="share-section">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<!-- ─── LOGIC ──────────────────────────────────────────────────── -->
<script>
(function() {
  const ua = navigator.userAgent || '';

  // ── Device detection ──────────────────────────────────────────
  const isIOS     = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);
  const isMobile  = isIOS || isAndroid;

  // ── Build real URLs ───────────────────────────────────────────
  const iosUrl = `https://apps.apple.com/app/${CONFIG.iosAppName}/id${CONFIG.iosAppId}`;
  const androidUrl = `https://play.google.com/store/apps/details?id=${CONFIG.androidPackage}`;
  const shareUrl = CONFIG.baseUrl;

  // ── Update button hrefs ───────────────────────────────────────
  document.getElementById('iosBtn').href = iosUrl;
  document.getElementById('androidBtn').href = androidUrl;

  // Update OG image meta tags
  document.querySelector('meta[property="og:image"]').content = CONFIG.ogImageUrl;
  document.querySelector('meta[name="twitter:image"]').content = CONFIG.ogImageUrl;
  document.querySelector('meta[property="og:url"]').content = CONFIG.baseUrl;
  document.querySelector('link[rel="canonical"]').href = CONFIG.baseUrl;

  // Build WhatsApp share URL
  const waText = encodeURIComponent(
    `Ar-Rayyan — Your Prayer Companion 🕌\n\n` +
    `Automatic rakah tracker, prayer times, qibla compass & digital tasbih. Free, no ads.\n\n` +
    `${shareUrl}`
  );
  document.getElementById('whatsappBtn').href = `https://wa.me/?text=${waText}`;

  // ── Auto-redirect ─────────────────────────────────────────────
  if (isMobile) {
    const badge = document.getElementById('redirectBadge');
    const msg   = document.getElementById('redirectMsg');
    const targetUrl = isIOS ? iosUrl : androidUrl;
    const storeName = isIOS ? 'App Store' : 'Google Play';

    msg.textContent = `Redirecting to ${storeName}…`;
    badge.classList.add('visible');

    // Redirect after configured delay
    setTimeout(() => {
      window.location.href = targetUrl;
    }, CONFIG.redirectDelayMs);
  }

  // ── Share ─────────────────────────────────────────────────────
  window.shareLink = async function() {
    const shareData = {
      title: 'Ar-Rayyan — Your Prayer Companion',
      text: 'Automatic rakah tracker, prayer times, qibla compass & digital tasbih. Free, no ads.',
      url: shareUrl,
    };

    // Try native Web Share API (works on mobile Safari & Chrome)
    if (navigator.share) {
      try {
        await navigator.share(shareData);
        return;
      } catch (e) {
        // User cancelled or API failed — fall through to clipboard
      }
    }

    // Fallback: copy to clipboard
    try {
      await navigator.clipboard.writeText(shareUrl);
    } catch (_) {
      // Last resort: select & copy
      const tmp = document.createElement('input');
      tmp.value = shareUrl;
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand('copy');
      document.body.removeChild(tmp);
    }

    // Show toast
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  };
})();
</script>
